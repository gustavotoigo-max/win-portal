<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WinPortal | Login</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="app.js"></script>
  </head>
  <body class="auth-page">
    <header class="site-header">
      <nav class="nav-shell" aria-label="Navegacao principal">
        <a class="brand" href="index.html"><span class="brand-mark" aria-hidden="true"></span><span>WinPortal</span></a>
        <button class="menu-button" type="button" aria-expanded="false" aria-controls="primary-menu"><span></span><span></span><span></span></button>
        <div class="nav-actions" id="primary-menu">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="dashboard.html">Dashboard</a>
          <a class="nav-link" href="cadastro.html">Cadastro</a>
          <a class="nav-icon" href="login.html" aria-label="Pesquisar"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m21 21-4.7-4.7m2.1-5.2a7.3 7.3 0 1 1-14.6 0 7.3 7.3 0 0 1 14.6 0Z"/></svg></a>
          <a class="avatar" href="login.html" aria-label="Entrar"><span>GP</span></a>
        </div>
      </nav>
    </header>

    <main class="auth-shell">
      <form class="auth-card">
        <h1>Windows Software</h1>
        <p>Entre com suas credenciais para acessar o sistema</p>
        <label>Email<input type="email" placeholder="seu@email.com"></label>
        <label>Senha<span><a href="#">Esqueci minha senha</a></span><input type="password" placeholder="********"></label>
        <button class="btn primary full" type="submit">Entrar</button>
        <div class="divider">OU CONTINUE COM</div>
        <div class="social-row">
          <button type="button">Google</button>
          <button type="button">SSO</button>
        </div>
        <p class="auth-switch">Nao tem uma conta? <a href="cadastro.html">Criar conta</a></p>
      </form>
    </main>
  </body>
</html>
